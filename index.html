<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Chatbot</title>
    <style>
        body { font-family: Arial, sans-serif; }
        #chatbot { border: 1px solid #ccc; padding: 10px; width: 300px; height: 400px; overflow-y: auto; }
        #user-input { width: 100%; padding: 10px; }
    </style>
</head>
<body>
    <div id="chatbot">
        <div id="messages"></div>
    </div>
    <input type="text" id="user-input" placeholder="Type your question here..." />
    <script>
        const messagesContainer = document.getElementById('messages');
        const userInput = document.getElementById('user-input');

        function addMessage(message) {
            const messageElement = document.createElement('div');
            messageElement.textContent = message;
            messagesContainer.appendChild(messageElement);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        userInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                const userText = userInput.value;
                addMessage(`You: ${userText}`);
                userInput.value = '';
                processInput(userText);
            }
        });

        function processInput(input) {
            let response = '';
            if (input.toLowerCase().includes('difficulty')) {
                response = 'Can you specify what type of difficulty you are facing?';
            } else if (input.toLowerCase().includes('resource')) {
                response = 'What subject are you looking for resources in?';
            } else {
                response = 'Can you elaborate more on your question?';
            }
            addMessage(`Chatbot: ${response}`);
        }
    </script>
</body>
</html>
